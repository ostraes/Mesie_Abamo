<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mesie Abamo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#2563eb",
            dark: "#0f172a"
          }
        }
      }
    }
  </script>

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center px-4">

  <!-- Glow Background -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute -top-32 -left-32 w-96 h-96 bg-blue-600/30 rounded-full blur-3xl animate-pulse"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-indigo-500/20 rounded-full blur-3xl animate-pulse"></div>
  </div>

  <!-- Card -->
  <div id="card"
       class="relative max-w-4xl w-full bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl shadow-2xl p-8 md:p-12 flex flex-col md:flex-row gap-10 opacity-0 translate-y-10 transition-all duration-700">

    <!-- Image -->
    <div class="flex justify-center md:justify-start">
      <img src="mesie_abamo.jpg"
           alt="Profile Photo"
           class="w-48 h-48 rounded-full object-cover ring-4 ring-white/30 hover:scale-105 transition-transform duration-300">
    </div>

    <!-- Content -->
    <div class="text-center md:text-left text-white flex-1">
      <h1 class="text-3xl md:text-4xl font-bold tracking-tight">
        Mesie Dearnie Zausa Abamo
      </h1>

      <p class="mt-3 text-slate-300 leading-relaxed">
        Lovemetics Cosmetics Manufacturing - CEO
      </p>

      <!-- Contact -->
      <div class="mt-6 space-y-2">
        <a href="tel:+639772667622"
           class="flex items-center justify-center md:justify-start gap-3 text-slate-200 hover:text-white transition">
          <i class="fa-solid fa-phone text-primary"></i>
          +63 977 266 7622 
        </a>

        
      </div>

      <!-- Socials -->
      <div class="mt-8 flex justify-center md:justify-start gap-4">
        <a data-ripple href="https://www.facebook.com/Meshingkiit?rdid=tfPtei8LJxH24A65&share_url=https%3A%2F%2Fwww.facebook.com%2Fshare%2F1aCxY4tSVe%2F#"
           target="_blank"
           class="social-btn">
          <i class="fab fa-facebook-f"></i>
        </a>
        <a data-ripple href="https://www.facebook.com/Makeyourbrandwithlove?rdid=VULzP9eaB36sBxyI&share_url=https%3A%2F%2Fwww.facebook.com%2Fshare%2F18a2UXEsnn%2F#"
           target="_blank"
           class="social-btn">
          <i class="fa-solid fa-heart"></i>
        </a>
        
      </div>
    </div>
  </div>

  <!-- Reusable Button Style -->
  <style>
    .social-btn {
      @apply relative w-12 h-12 rounded-full bg-white/10 text-white
             flex items-center justify-center text-lg
             border border-white/20
             hover:bg-primary hover:scale-110
             transition-all duration-300 overflow-hidden;
    }

    .ripple {
      position: absolute;
      border-radius: 9999px;
      transform: scale(0);
      animation: ripple 600ms linear;
      background-color: rgba(255, 255, 255, 0.6);
    }

    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }
  </style>

  <!-- JavaScript -->
  <script>
    // Entrance animation
    window.addEventListener("load", () => {
      const card = document.getElementById("card");
      card.classList.remove("opacity-0", "translate-y-10");
      card.classList.add("opacity-100", "translate-y-0");
    });

    // Ripple effect
    document.querySelectorAll("[data-ripple]").forEach(button => {
      button.addEventListener("click", function (e) {
        const circle = document.createElement("span");
        const diameter = Math.max(this.clientWidth, this.clientHeight);
        const radius = diameter / 2;

        circle.style.width = circle.style.height = `${diameter}px`;
        circle.style.left = `${e.clientX - this.getBoundingClientRect().left - radius}px`;
        circle.style.top = `${e.clientY - this.getBoundingClientRect().top - radius}px`;
        circle.classList.add("ripple");

        const ripple = this.getElementsByClassName("ripple")[0];
        if (ripple) ripple.remove();

        this.appendChild(circle);
      });
    });
  </script>

</body>
</html>
